name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Check formatting (black)
        working-directory: backend
        run: black --check --diff app/ tests/

      - name: Check imports (isort)
        working-directory: backend
        run: isort --check-only --diff app/ tests/

      - name: Lint (flake8)
        working-directory: backend
        run: flake8 app/ tests/
        continue-on-error: true

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app/
        continue-on-error: true

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: backend
        env:
          LLM_PROVIDER: featherless
          FEATHERLESS_API_KEY: test-featherless-key
          FEATHERLESS_MODEL: deepseek-ai/DeepSeek-V4-Pro
          FEATHERLESS_BASE_URL: https://api.featherless.ai/v1
          MAX_REPAIR_RETRIES: "3"
          DB_PATH: ":memory:"
          DATABASE_URL: "sqlite:///:memory:"
          ENVIRONMENT: test
        run: |
          python -m pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term --junitxml=junit.xml -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/junit.xml
          retention-days: 7

      - name: Fail if tests failed
        if: failure()
        run: exit 1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: extractiq-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify FastAPI starts
        run: |
          docker run -d --name extractiq-test \
            -e LLM_PROVIDER=featherless \
            -e FEATHERLESS_API_KEY=test-featherless-key \
            -e FEATHERLESS_MODEL=deepseek-ai/DeepSeek-V4-Pro \
            -e FEATHERLESS_BASE_URL=https://api.featherless.ai/v1 \
            -e MAX_REPAIR_RETRIES=3 \
            -e DB_PATH=data/extractions.db \
            -e DATABASE_URL=sqlite:///data/extractions.db \
            -p 8000:8000 \
            extractiq-engine:ci

          sleep 3
          curl -f http://localhost:8000/health || (
            echo "=== Container logs ==="
            docker logs extractiq-test
            exit 1
          )
          docker stop extractiq-test
          docker rm extractiq-test
