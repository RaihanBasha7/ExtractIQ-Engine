name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

jobs:

  # ─────────────────────────────────────────────
  # BACKEND LINT
  # ─────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Check formatting (black)
        working-directory: backend
        run: black --check --diff app/ tests/

      - name: Check imports (isort)
        working-directory: backend
        run: isort --check-only --diff app/ tests/

      - name: Lint (flake8)
        working-directory: backend
        run: flake8 app/ tests/

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app/

  # ─────────────────────────────────────────────
  # FRONTEND LINT
  # ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Type check (TypeScript)
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # BACKEND TESTS
  # ─────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: backend
        env:
          LLM_PROVIDER: featherless
          FEATHERLESS_API_KEY: test-featherless-key
          FEATHERLESS_MODEL: google/gemma-4-31B-it
          FEATHERLESS_BASE_URL: https://api.featherless.ai/v1
          MAX_REPAIR_RETRIES: "3"
          DB_PATH: ":memory:"
          DATABASE_URL: "sqlite:///:memory:"
          ENVIRONMENT: test
        run: |
          python -m pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term --junitxml=junit.xml -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/junit.xml
          retention-days: 7

  # ─────────────────────────────────────────────
  # DOCKER BUILD
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: extractiq-engine-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify backend FastAPI starts
        run: |
          docker run -d --name extractiq-backend-test \
            -e LLM_PROVIDER=featherless \
            -e FEATHERLESS_API_KEY=test-featherless-key \
            -e FEATHERLESS_MODEL=google/gemma-4-31B-it \
            -e FEATHERLESS_BASE_URL=https://api.featherless.ai/v1 \
            -e MAX_REPAIR_RETRIES=3 \
            -e DB_PATH=data/extractions.db \
            -e DATABASE_URL=sqlite:///data/extractions.db \
            -p 8000:8000 \
            extractiq-engine-backend:ci

          echo "Waiting for backend..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Attempt $i/10..."
            sleep 2
          done
          curl -f http://localhost:8000/health || (
            echo "=== Container logs ==="
            docker logs extractiq-backend-test
            docker stop extractiq-backend-test
            docker rm extractiq-backend-test
            exit 1
          )
          docker stop extractiq-backend-test
          docker rm extractiq-backend-test

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: extractiq-engine-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
