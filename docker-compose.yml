services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: extractiq-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - DB_PATH=data/extractions.db
      - DATABASE_URL=sqlite:///data/extractions.db
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - extractiq-network

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: extractiq-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - extractiq-network

volumes:
  backend_data:

networks:
  extractiq-network:
    driver: bridge
